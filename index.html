<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Claude Vibekode</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    header {
      text-align: center;
      padding: 2rem;
    }

    header h1 {
      font-size: 3rem;
      background: linear-gradient(135deg, #a855f7, #3b82f6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.5rem;
    }

    header p {
      color: #888;
      font-size: 1.1rem;
    }

    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 2rem 2.5rem;
      max-width: 480px;
      width: 90%;
      text-align: center;
      margin-top: 2rem;
    }

    .card h2 {
      font-size: 1.3rem;
      margin-bottom: 1rem;
      color: #c084fc;
    }

    .card p {
      line-height: 1.7;
      color: #aaa;
    }

    footer {
      margin-top: 3rem;
      color: #555;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <header>
    <h1>Claude Vibekode</h1>
    <p>Laget med hjelp av Claude Code</p>
  </header>

  <div class="card">
    <h2>Hei, verden!</h2>
    <p>
      Dette er en enkel nettside generert som en del av et GitHub-prosjekt.
      Endre den gjerne og push endringene til repoet ditt.
    </p>
  </div>

  <footer>
    <p>vaskarheim-critic &mdash; 2026</p>
  </footer>
</body>
</html>
